<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111118"/>
      <stop offset="100%" style="stop-color:#0a0a0b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book shape -->
  <rect x="96" y="120" width="148" height="272" rx="12" fill="url(#accent)" opacity="0.9"/>
  <rect x="108" y="132" width="124" height="248" rx="8" fill="#0a0a0b" opacity="0.4"/>
  <rect x="268" y="120" width="148" height="272" rx="12" fill="url(#accent)" opacity="0.7"/>
  <rect x="280" y="132" width="124" height="248" rx="8" fill="#0a0a0b" opacity="0.4"/>
  <!-- Spine -->
  <rect x="240" y="110" width="32" height="292" rx="6" fill="#6366f1"/>
  <!-- Lines on left page -->
  <rect x="118" y="168" width="90" height="6" rx="3" fill="#818cf8" opacity="0.6"/>
  <rect x="118" y="188" width="70" height="6" rx="3" fill="#818cf8" opacity="0.4"/>
  <rect x="118" y="208" width="82" height="6" rx="3" fill="#818cf8" opacity="0.4"/>
  <rect x="118" y="228" width="60" height="6" rx="3" fill="#818cf8" opacity="0.3"/>
  <!-- Lines on right page -->
  <rect x="288" y="168" width="90" height="6" rx="3" fill="#818cf8" opacity="0.6"/>
  <rect x="288" y="188" width="70" height="6" rx="3" fill="#818cf8" opacity="0.4"/>
  <rect x="288" y="208" width="82" height="6" rx="3" fill="#818cf8" opacity="0.4"/>
  <rect x="288" y="228" width="60" height="6" rx="3" fill="#818cf8" opacity="0.3"/>
  <!-- M lettermark -->
  <text x="256" y="360" font-size="72" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" fill="#818cf8" opacity="0.9">M</text>
</svg>
